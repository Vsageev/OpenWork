services:
  postgres:
    image: postgres:16
    container_name: openwork-postgres
    restart: unless-stopped
    ports:
      - '${POSTGRES_PORT:-5433}:5432'
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-openwork}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-openwork}
      POSTGRES_DB: ${POSTGRES_DB:-openwork}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-openwork} -d ${POSTGRES_DB:-openwork}']
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: packages/backend/Dockerfile
    container_name: openwork-backend
    restart: unless-stopped
    ports:
      - '${BACKEND_PORT:-3847}:3847'
    environment:
      NODE_ENV: development
      PORT: 3847
      HOST: 0.0.0.0
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
      DATABASE_URL: postgres://${POSTGRES_USER:-openwork}:${POSTGRES_PASSWORD:-openwork}@postgres:5432/${POSTGRES_DB:-openwork}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - backups:/app/backups
    profiles:
      - full

  frontend:
    build:
      context: .
      dockerfile: packages/frontend/Dockerfile
    container_name: openwork-frontend
    restart: unless-stopped
    ports:
      - '${FRONTEND_PORT:-5173}:5173'
    environment:
      VITE_API_URL: http://backend:3847
    depends_on:
      - backend
    profiles:
      - full

volumes:
  backups:
  postgres-data:
